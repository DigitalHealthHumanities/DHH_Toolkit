  - term: "Network Graph"
    definition: "Digital Humanities researchers use network graphs to examine the connections and relations between objects, people, and concepts. Network graphs illustrate and weight these connections in clusters generated by the amount of connections (edges) between different people, places, things and ideas (nodes)." 

